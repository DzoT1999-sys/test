<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GREEN-API · Тестовая панель</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: #f3f5f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 24px;
        }

        .dashboard {
            max-width: 1200px;
            width: 100%;
            display: flex;
            gap: 24px;
            align-items: stretch;
        }

        .left-panel {
            flex: 1.2;
            background-color: #ffffff;
            border-radius: 32px;
            box-shadow: 0 20px 40px -8px rgba(0, 20, 30, 0.12);
            padding: 32px 28px;
            border: 1px solid #eaedf2;
            display: flex;
            flex-direction: column;
        }

        .right-panel {
            flex: 1;
            background-color: #ffffff;
            border-radius: 32px;
            box-shadow: 0 20px 40px -8px rgba(0, 20, 30, 0.12);
            padding: 32px 28px;
            border: 1px solid #eaedf2;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 32px;
        }

        .logo-img {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            object-fit: contain;
            background: white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }

        .title-section h2 {
            font-weight: 700;
            font-size: 24px;
            color: #0b1c2c;
            letter-spacing: -0.01em;
        }

        .title-section .sub {
            font-size: 15px;
            color: #5e6f8c;
            margin-top: 4px;
        }

        .input-block {
            margin-bottom: 28px;
        }

        .input-label {
            font-size: 14px;
            font-weight: 600;
            color: #1f2a41;
            margin-bottom: 6px;
            display: block;
        }

        .field {
            background-color: #f7f9fc;
            border: 1.5px solid #dfe5ef;
            border-radius: 18px;
            padding: 14px 18px;
            width: 100%;
            font-size: 15px;
            color: #0f1a2a;
            transition: 0.15s;
            margin-bottom: 18px;
        }

        .field:focus {
            outline: none;
            border-color: #00a884;
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(0, 168, 132, 0.08);
        }

        .action-stack {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 24px;
        }

        .btn {
            border: none;
            border-radius: 40px;
            padding: 14px 20px;
            font-weight: 600;
            font-size: 15px;
            background-color: #edf2f9;
            color: #1f2a41;
            cursor: pointer;
            transition: all 0.15s ease;
            border: 1px solid transparent;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.02);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
        }

        .btn-primary {
            background-color: #00a884;
            color: white;
            box-shadow: 0 8px 16px -4px rgba(0, 168, 132, 0.25);
        }

        .btn-primary:hover {
            background-color: #009070;
            transform: translateY(-1px);
        }

        .btn-outline {
            background-color: white;
            border: 1.5px solid #d0dbea;
            color: #1e2b3c;
        }

        .btn-outline:hover {
            background-color: #f9fbfd;
            border-color: #00a884;
        }

        .inline-panel {
            background: #fafcff;
            border-radius: 22px;
            padding: 20px 18px;
            margin: 10px 0 18px;
            border: 1px solid #e6ecf5;
        }

        .row-dual {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 14px;
        }

        .dual-item {
            flex: 1;
            min-width: 160px;
        }

        .dual-item label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #435574;
            margin-bottom: 6px;
        }

        .inline-field {
            background: white;
            border: 1.5px solid #dee6f0;
            border-radius: 16px;
            padding: 12px 16px;
            width: 100%;
            font-size: 14px;
        }

        .inline-field:focus {
            border-color: #00a884;
            outline: none;
        }

        .panel-action-btn {
            display: flex;
            justify-content: flex-end;
            margin-top: 6px;
        }

        .btn-small {
            padding: 10px 22px;
            font-size: 14px;
            width: auto;
        }

        .response-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .response-header h3 {
            font-weight: 600;
            font-size: 18px;
            color: #1f2a41;
        }

        .btn-clear {
            background: none;
            border: 1px solid #d9e2ef;
            padding: 6px 16px;
            border-radius: 30px;
            color: #5e7a9c;
            font-weight: 500;
            font-size: 13px;
            cursor: pointer;
        }

        .btn-clear:hover {
            background: #eef3fc;
        }

        .response-box {
            background-color: #f2f6fe;
            border-radius: 24px;
            padding: 24px;
            border: 1px solid #e2eaf5;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .response-output {
            background-color: #ffffff;
            border-radius: 18px;
            padding: 24px;
            font-family: 'SF Mono', 'Menlo', 'Monaco', 'Cascadia Code', 'Consolas', monospace;
            font-size: 14px;
            line-height: 1.5;
            color: #1e293b;
            border: 1px solid #dde3ed;
            min-height: 300px;
            max-height: 600px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-word;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
            margin: 0;
            flex: 1;
        }

        .response-output:empty::before {
            content: "Ответ появится здесь...";
            color: #8899b6;
        }

        .footer-github {
            margin-top: 20px;
            text-align: right;
            font-size: 13px;
        }

        .footer-github a {
            color: #00a884;
            text-decoration: none;
            font-weight: 500;
        }

        hr {
            border: none;
            border-top: 1.5px solid #eef2f8;
            margin: 12px 0;
        }
    </style>
</head>
<body>
<div class="dashboard">
    <!-- ЛЕВАЯ КОЛОНКА: элементы управления -->
    <div class="left-panel">
        <div class="header">
            <!-- Локальный логотип GREEN-API -->
            <img class="logo-img" src="logo.png" alt="GREEN-API logo">
            <div class="title-section">
                <h2>GREEN-API</h2>
                <div class="sub">Тестовая панель методов</div>
            </div>
        </div>

        <!-- Учётные данные -->
        <div class="input-block">
            <label class="input-label">idInstance</label>
            <input type="text" id="idInstance" class="field" placeholder="1101234567" autocomplete="off">
            
            <label class="input-label">ApiTokenInstance</label>
            <input type="password" id="apiTokenInstance" class="field" placeholder="••••••••••••••••" autocomplete="off">
        </div>

        <!-- Кнопки методов (вертикально) -->
        <div class="action-stack">
            <button class="btn btn-primary" id="btnGetSettings">⚙️ getSettings</button>
            <button class="btn btn-primary" id="btnGetStateInstance">📡 getStateInstance</button>
        </div>

        <!-- sendMessage с выпадающей панелью -->
        <div>
            <button class="btn btn-outline" id="btnSendMessage">💬 sendMessage</button>
            <div id="sendMessagePanel" class="inline-panel" style="display: none;">
                <div class="row-dual">
                    <div class="dual-item">
                        <label>📞 Chat ID</label>
                        <input type="text" id="chatId" class="inline-field" placeholder="Укажите номер телефона получателя">
                    </div>
                    <div class="dual-item">
                        <label>💬 Сообщение</label>
                        <input type="text" id="messageText" class="inline-field" placeholder="Введите текст сообщения">
                    </div>
                </div>
                <div class="panel-action-btn">
                    <button class="btn btn-primary btn-small" id="sendMessageExecute">Отправить</button>
                </div>
            </div>
        </div>

        <!-- sendFileByUrl с выпадающей панелью -->
        <div style="margin-top: 8px;">
            <button class="btn btn-outline" id="btnSendFileByUrl">📎 sendFileByUrl</button>
            <div id="sendFilePanel" class="inline-panel" style="display: none;">
                <div class="row-dual">
                    <div class="dual-item">
                        <label>📞 Chat ID</label>
                        <input type="text" id="fileChatId" class="inline-field" placeholder="Укажите номер телефона получателя">
                    </div>
                    <div class="dual-item">
                        <label>🔗 URL файла</label>
                        <input type="text" id="fileUrl" class="inline-field" placeholder="Вставьте ссылку на файл">
                    </div>
                </div>
                <div class="row-dual">
                    <div class="dual-item">
                        <label>📄 Имя файла</label>
                        <input type="text" id="fileName" class="inline-field" placeholder="Укажите наименование файла">
                    </div>
                    <div class="dual-item"></div>
                </div>
                <div class="panel-action-btn">
                    <button class="btn btn-primary btn-small" id="sendFileExecute">Отправить файл</button>
                </div>
            </div>
        </div>

        <!-- GitHub ссылка -->
        <div class="footer-github">
            <a href="#" id="githubLink" target="_blank">github.com/DzoT1999-sys/test</a>
        </div>
    </div>

    <!-- ПРАВАЯ КОЛОНКА: ответ сервера -->
    <div class="right-panel">
        <div class="response-header">
            <h3>📋 Ответ сервера</h3>
            <button class="btn-clear" id="clearResponseBtn">Очистить</button>
        </div>
        <div class="response-box">
            <pre id="responseOutput" class="response-output"></pre>
        </div>
        <div style="margin-top: 16px; color: #6a7f9f; font-size: 13px; text-align: center;">
            ⓘ Ответ отображается в формате JSON
        </div>
    </div>
</div>

<script>
    (function(){
        "use strict";

        // DOM элементы
        const idInstanceInput = document.getElementById('idInstance');
        const apiTokenInput = document.getElementById('apiTokenInstance');
        const responseOutput = document.getElementById('responseOutput');

        const btnGetSettings = document.getElementById('btnGetSettings');
        const btnGetStateInstance = document.getElementById('btnGetStateInstance');
        const btnSendMessage = document.getElementById('btnSendMessage');
        const btnSendFileByUrl = document.getElementById('btnSendFileByUrl');

        const sendMessagePanel = document.getElementById('sendMessagePanel');
        const sendFilePanel = document.getElementById('sendFilePanel');

        const chatIdInput = document.getElementById('chatId');
        const messageTextInput = document.getElementById('messageText');
        const sendMessageExec = document.getElementById('sendMessageExecute');

        const fileChatIdInput = document.getElementById('fileChatId');
        const fileUrlInput = document.getElementById('fileUrl');
        const fileNameInput = document.getElementById('fileName');
        const sendFileExec = document.getElementById('sendFileExecute');

        const clearBtn = document.getElementById('clearResponseBtn');
        const githubLink = document.getElementById('githubLink');

        githubLink.href = "https://github.com/DzoT1999-sys/test";

        // Утилиты
        function displayResponse(methodLabel, data, isError = false) {
            const time = new Date().toLocaleTimeString();
            let out = `[${time}] ${methodLabel}\n`;
            if (isError) out += `❌ Ошибка:\n`;
            out += (typeof data === 'object') ? JSON.stringify(data, null, 2) : String(data);
            responseOutput.textContent = out;
        }

        function clearResponse() {
            responseOutput.textContent = '';
        }

        function validateCredentials() {
            const id = idInstanceInput.value.trim();
            const token = apiTokenInput.value.trim();
            if (!id || !token) {
                displayResponse('Валидация', '❌ idInstance и ApiTokenInstance обязательны', true);
                return false;
            }
            return true;
        }

        function getBaseUrl() {
            const id = idInstanceInput.value.trim();
            if (!id) return null;
            return `https://${id.substring(0,4)}.api.green-api.com`;
        }

        async function callApi(method, body = null, isPost = false) {
            if (!validateCredentials()) return;

            const id = idInstanceInput.value.trim();
            const token = apiTokenInput.value.trim();
            const base = getBaseUrl();
            if (!base) return;

            const url = `${base}/waInstance${id}/${method}/${token}`;
            const options = {
                method: isPost ? 'POST' : 'GET',
                headers: { 'Content-Type': 'application/json' },
            };
            if (isPost && body) options.body = JSON.stringify(body);

            try {
                const res = await fetch(url, options);
                const contentType = res.headers.get('content-type');
                let respData;
                if (contentType && contentType.includes('application/json')) {
                    respData = await res.json();
                } else {
                    respData = await res.text();
                }

                if (!res.ok) {
                    displayResponse(method, { status: res.status, statusText: res.statusText, data: respData }, true);
                } else {
                    displayResponse(method, respData);
                }
            } catch (err) {
                displayResponse(method, { error: err.message }, true);
            }
        }

        // Скрыть все панели
        function hidePanels() {
            sendMessagePanel.style.display = 'none';
            sendFilePanel.style.display = 'none';
        }

        // Обработчики
        btnGetSettings.addEventListener('click', () => {
            hidePanels();
            callApi('getSettings');
        });

        btnGetStateInstance.addEventListener('click', () => {
            hidePanels();
            callApi('getStateInstance');
        });

        btnSendMessage.addEventListener('click', () => {
            hidePanels();
            sendMessagePanel.style.display = 'block';
            displayResponse('sendMessage', '⏳ Заполните поля и нажмите "Отправить"');
        });

        btnSendFileByUrl.addEventListener('click', () => {
            hidePanels();
            sendFilePanel.style.display = 'block';
            displayResponse('sendFileByUrl', '⏳ Введите данные и нажмите "Отправить файл"');
        });

        sendMessageExec.addEventListener('click', () => {
            const chatId = chatIdInput.value.trim();
            const message = messageTextInput.value.trim();
            if (!chatId || !message) {
                displayResponse('sendMessage', '❌ chatId и message обязательны', true);
                return;
            }
            callApi('sendMessage', { chatId, message }, true);
        });

        sendFileExec.addEventListener('click', () => {
            const chatId = fileChatIdInput.value.trim();
            const urlFile = fileUrlInput.value.trim();
            const fileName = fileNameInput.value.trim();
            if (!chatId || !urlFile || !fileName) {
                displayResponse('sendFileByUrl', '❌ Все поля обязательны', true);
                return;
            }
            callApi('sendFileByUrl', { chatId, urlFile, fileName }, true);
        });

        clearBtn.addEventListener('click', clearResponse);

        // При загрузке очищаем ответ (никаких демо)
        window.addEventListener('load', () => {
            clearResponse();
        });

        console.log('✅ Двухколоночный макет GREEN-API готов');
    })();
</script>
</body>
</html>
