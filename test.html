<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GREEN-API Console (Макет)</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #f3f5f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 24px;
            margin: 0;
        }

        /* Основная карточка — как на макете */
        .console {
            max-width: 900px;
            width: 100%;
            background-color: #ffffff;
            border-radius: 32px;
            box-shadow: 0 20px 40px -8px rgba(0, 20, 30, 0.12);
            padding: 32px 36px;
            border: 1px solid #eaedf2;
        }

        /* Логотип и заголовок */
        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 28px;
        }

        .logo-icon {
            background-color: #00a884;
            width: 44px;
            height: 44px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 22px;
        }

        .title-section h2 {
            font-weight: 700;
            font-size: 24px;
            color: #0b1c2c;
            letter-spacing: -0.01em;
        }

        .title-section .sub {
            font-size: 15px;
            color: #5e6f8c;
            margin-top: 2px;
        }

        /* Группы полей ввода — точь-в-точь как на макете */
        .input-block {
            margin-bottom: 24px;
        }

        .input-label {
            font-size: 15px;
            font-weight: 600;
            color: #1f2a41;
            margin-bottom: 8px;
            display: block;
        }

        .field {
            background-color: #f7f9fc;
            border: 1.5px solid #dfe5ef;
            border-radius: 18px;
            padding: 14px 18px;
            width: 100%;
            font-size: 16px;
            color: #0f1a2a;
            transition: 0.15s;
            margin-bottom: 16px;
        }

        .field:focus {
            outline: none;
            border-color: #00a884;
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(0, 168, 132, 0.08);
        }

        .field::placeholder {
            color: #98a9bb;
            font-weight: 400;
        }

        /* Две строки для idInstance и ApiTokenInstance */
        .credential-row {
            display: flex;
            gap: 24px;
            margin-bottom: 8px;
        }

        .credential-item {
            flex: 1;
        }

        /* Кнопки в строку — в макете они идут подряд */
        .action-bar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
            margin: 12px 0 18px;
        }

        .btn {
            border: none;
            border-radius: 40px;
            padding: 12px 28px;
            font-weight: 600;
            font-size: 15px;
            background-color: #edf2f9;
            color: #1f2a41;
            cursor: pointer;
            transition: all 0.15s ease;
            border: 1px solid transparent;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.02);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background-color: #00a884;
            color: white;
            box-shadow: 0 8px 16px -4px rgba(0, 168, 132, 0.25);
        }

        .btn-primary:hover {
            background-color: #009070;
            transform: translateY(-1px);
        }

        .btn-outline {
            background-color: white;
            border: 1.5px solid #d0dbea;
            color: #1e2b3c;
        }

        .btn-outline:hover {
            background-color: #f9fbfd;
            border-color: #00a884;
        }

        /* Ряды с вложенными полями — в макете под кнопками */
        .inline-panel {
            background: #fafcff;
            border-radius: 22px;
            padding: 20px 18px;
            margin: 18px 0 20px;
            border: 1px solid #e6ecf5;
        }

        .row-dual {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .dual-item {
            flex: 1;
            min-width: 180px;
        }

        .dual-item label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #435574;
            margin-bottom: 6px;
        }

        .inline-field {
            background: white;
            border: 1.5px solid #dee6f0;
            border-radius: 18px;
            padding: 12px 16px;
            width: 100%;
            font-size: 15px;
        }

        .inline-field:focus {
            border-color: #00a884;
            outline: none;
        }

        /* Секция ответа (readonly) */
        .response-container {
            margin-top: 20px;
        }

        .response-label {
            font-size: 15px;
            font-weight: 600;
            color: #1f2a41;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .response-box {
            background-color: #f2f6fe;
            border-radius: 24px;
            padding: 24px;
            border: 1px solid #e2eaf5;
        }

        .response-output {
            background-color: #ffffff;
            border-radius: 18px;
            padding: 20px 24px;
            font-family: 'SF Mono', 'Menlo', 'Monaco', 'Cascadia Code', 'Consolas', monospace;
            font-size: 14px;
            line-height: 1.5;
            color: #1e293b;
            border: 1px solid #dde3ed;
            min-height: 140px;
            max-height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-word;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }

        .response-output:empty::before {
            content: "Ответ появится здесь...";
            color: #8899b6;
        }

        .btn-clear {
            background: none;
            border: 1px solid #d9e2ef;
            padding: 6px 16px;
            border-radius: 30px;
            color: #5e7a9c;
            font-weight: 500;
            font-size: 13px;
            cursor: pointer;
        }

        .btn-clear:hover {
            background: #eef3fc;
        }

        /* Элементы макета: иконки и мелкие штрихи */
        .mock-note {
            color: #4a6885;
            font-size: 14px;
            margin-left: 6px;
        }

        hr {
            border: none;
            border-top: 1.5px solid #eef2f8;
            margin: 20px 0 10px;
        }

        .footer-github {
            margin-top: 18px;
            text-align: right;
            font-size: 14px;
        }

        .footer-github a {
            color: #00a884;
            text-decoration: none;
            font-weight: 500;
        }
    </style>
</head>
<body>
<div class="console">
    <!-- Верхняя часть как на фото: логотип и подпись -->
    <div class="header">
        <div class="logo-icon">G</div>
        <div class="title-section">
            <h2>GREEN-API</h2>
            <div class="sub">Тестовая панель методов</div>
        </div>
    </div>

    <!-- idInstance и ApiTokenInstance (две строки или рядом — в макете они идут друг под другом) -->
    <div class="input-block">
        <div class="credential-row">
            <div class="credential-item">
                <label class="input-label">idInstance</label>
                <input type="text" id="idInstance" class="field" placeholder="1101234567" autocomplete="off" value="">
            </div>
            <div class="credential-item">
                <label class="input-label">ApiTokenInstance</label>
                <input type="password" id="apiTokenInstance" class="field" placeholder="••••••••••••••••" autocomplete="off" value="">
            </div>
        </div>
    </div>

    <!-- Кнопки методов: getSettings, getStateInstance, sendMessage, sendFileByUrl (точно как в макете) -->
    <div class="action-bar">
        <button class="btn btn-primary" id="btnGetSettings">⚙️ getSettings</button>
        <button class="btn btn-primary" id="btnGetStateInstance">📡 getStateInstance</button>
        <button class="btn btn-outline" id="btnSendMessage">💬 sendMessage</button>
        <button class="btn btn-outline" id="btnSendFileByUrl">📎 sendFileByUrl</button>
    </div>

    <!-- Блоки, отображаемые динамически при необходимости (по макету — поля появляются под кнопками) -->
    <!-- sendMessage панель -->
    <div id="sendMessagePanel" class="inline-panel" style="display: none;">
        <div class="row-dual">
            <div class="dual-item">
                <label>📞 Chat ID (WhatsApp)</label>
                <input type="text" id="chatId" class="inline-field" placeholder="7777234567@c.us" value="7777234567@c.us">
            </div>
            <div class="dual-item">
                <label>💬 Сообщение</label>
                <input type="text" id="messageText" class="inline-field" placeholder="Hello Gmail!" value="Hello Gmail!">
            </div>
        </div>
        <div style="display: flex; justify-content: flex-end;">
            <button class="btn btn-primary" id="sendMessageExecute" style="padding: 10px 24px;">Отправить</button>
        </div>
    </div>

    <!-- sendFileByUrl панель -->
    <div id="sendFilePanel" class="inline-panel" style="display: none;">
        <div class="row-dual">
            <div class="dual-item">
                <label>📞 Chat ID</label>
                <input type="text" id="fileChatId" class="inline-field" placeholder="7777234567@c.us" value="7777234567@c.us">
            </div>
            <div class="dual-item">
                <label>🔗 URL файла</label>
                <input type="text" id="fileUrl" class="inline-field" placeholder="https://my.spec.com/img/horse.png" value="https://my.spec.com/img/horse.png">
            </div>
        </div>
        <div class="row-dual">
            <div class="dual-item">
                <label>📄 Имя файла</label>
                <input type="text" id="fileName" class="inline-field" placeholder="horse.png" value="horse.png">
            </div>
            <div class="dual-item"></div> <!-- пустой для выравнивания -->
        </div>
        <div style="display: flex; justify-content: flex-end;">
            <button class="btn btn-primary" id="sendFileExecute" style="padding: 10px 24px;">Отправить файл</button>
        </div>
    </div>

    <!-- Область вывода ответа (в макете: "Ответ:" и пример json) -->
    <div class="response-container">
        <div class="response-label">
            <span>📋 Ответ сервера</span>
            <button class="btn-clear" id="clearResponseBtn">Очистить</button>
        </div>
        <div class="response-box">
            <pre id="responseOutput" class="response-output"></pre>
        </div>
    </div>

    <!-- Ссылка на GitHub (как в макете — внизу) -->
    <div class="footer-github">
        <a href="#" id="githubLink" target="_blank">github.com/your/green-api-test</a>
    </div>
</div>

<script>
    (function(){
        "use strict";

        // ----- Элементы DOM -----
        const idInstanceInput = document.getElementById('idInstance');
        const apiTokenInput = document.getElementById('apiTokenInstance');
        const responseOutput = document.getElementById('responseOutput');

        // Кнопки верхнего уровня
        const btnGetSettings = document.getElementById('btnGetSettings');
        const btnGetStateInstance = document.getElementById('btnGetStateInstance');
        const btnSendMessage = document.getElementById('btnSendMessage');
        const btnSendFileByUrl = document.getElementById('btnSendFileByUrl');

        // Панели
        const sendMessagePanel = document.getElementById('sendMessagePanel');
        const sendFilePanel = document.getElementById('sendFilePanel');

        // Поля sendMessage
        const chatIdInput = document.getElementById('chatId');
        const messageTextInput = document.getElementById('messageText');
        const sendMessageExec = document.getElementById('sendMessageExecute');

        // Поля sendFile
        const fileChatIdInput = document.getElementById('fileChatId');
        const fileUrlInput = document.getElementById('fileUrl');
        const fileNameInput = document.getElementById('fileName');
        const sendFileExec = document.getElementById('sendFileExecute');

        const clearBtn = document.getElementById('clearResponseBtn');
        const githubLink = document.getElementById('githubLink');

        // Настройка ссылки (условно)
        githubLink.href = "https://github.com/yourusername/green-api-test-task";

        // ----- Утилиты -----
        function displayResponse(methodLabel, data, isError = false) {
            const time = new Date().toLocaleTimeString();
            let out = `[${time}] ${methodLabel}\n`;
            if (isError) out += `❌ Ошибка:\n`;
            out += (typeof data === 'object') ? JSON.stringify(data, null, 2) : String(data);
            responseOutput.textContent = out;
        }

        function clearResponse() {
            responseOutput.textContent = '';
        }

        function validateCredentials() {
            const id = idInstanceInput.value.trim();
            const token = apiTokenInput.value.trim();
            if (!id || !token) {
                displayResponse('Валидация', '❌ idInstance и ApiTokenInstance обязательны', true);
                return false;
            }
            return true;
        }

        function getBaseUrl() {
            const id = idInstanceInput.value.trim();
            if (!id) return null;
            return `https://${id.substring(0,4)}.api.green-api.com`;
        }

        async function callApi(method, body = null, isPost = false) {
            if (!validateCredentials()) return;

            const id = idInstanceInput.value.trim();
            const token = apiTokenInput.value.trim();
            const base = getBaseUrl();
            if (!base) return;

            const url = `${base}/waInstance${id}/${method}/${token}`;
            const options = {
                method: isPost ? 'POST' : 'GET',
                headers: { 'Content-Type': 'application/json' },
            };
            if (isPost && body) options.body = JSON.stringify(body);

            try {
                const res = await fetch(url, options);
                const contentType = res.headers.get('content-type');
                let respData;
                if (contentType && contentType.includes('application/json')) {
                    respData = await res.json();
                } else {
                    respData = await res.text();
                }

                if (!res.ok) {
                    displayResponse(method, { status: res.status, statusText: res.statusText, data: respData }, true);
                } else {
                    displayResponse(method, respData);
                }
            } catch (err) {
                displayResponse(method, { error: err.message }, true);
            }
        }

        // Скрываем панели при вызове get-методов
        function hidePanels() {
            sendMessagePanel.style.display = 'none';
            sendFilePanel.style.display = 'none';
        }

        // ----- Обработчики -----
        btnGetSettings.addEventListener('click', () => {
            hidePanels();
            callApi('getSettings');
        });

        btnGetStateInstance.addEventListener('click', () => {
            hidePanels();
            callApi('getStateInstance');
        });

        btnSendMessage.addEventListener('click', () => {
            // Переключаем видимость панели
            hidePanels();
            sendMessagePanel.style.display = 'block';
            // Можно подсказать
            if (!responseOutput.textContent.includes('заполните')) {
                displayResponse('sendMessage', '⏳ Заполните поля и нажмите "Отправить"');
            }
        });

        btnSendFileByUrl.addEventListener('click', () => {
            hidePanels();
            sendFilePanel.style.display = 'block';
            displayResponse('sendFileByUrl', '⏳ Введите chatId, URL и имя файла, затем "Отправить файл"');
        });

        // Отправка сообщения
        sendMessageExec.addEventListener('click', () => {
            const chatId = chatIdInput.value.trim();
            const message = messageTextInput.value.trim();
            if (!chatId || !message) {
                displayResponse('sendMessage', '❌ chatId и message обязательны', true);
                return;
            }
            callApi('sendMessage', { chatId, message }, true);
        });

        // Отправка файла
        sendFileExec.addEventListener('click', () => {
            const chatId = fileChatIdInput.value.trim();
            const urlFile = fileUrlInput.value.trim();
            const fileName = fileNameInput.value.trim();
            if (!chatId || !urlFile || !fileName) {
                displayResponse('sendFileByUrl', '❌ Все поля обязательны', true);
                return;
            }
            callApi('sendFileByUrl', { chatId, urlFile, fileName }, true);
        });

        clearBtn.addEventListener('click', clearResponse);

        // Дополнительно: при клике вне панелей можно не скрывать, поведение как в макете
        // Если хотим сделать как на скрине — панели остаются до следующего переключения.
        // Также предзаполняем дефолтные значения из макета для наглядности
        window.addEventListener('load', () => {
            // Примерные данные из макета
            idInstanceInput.placeholder = "1101234567";
            apiTokenInput.placeholder = "••••••••••••";
            // Пример ответа в макете: показываем при загрузке?
            displayResponse('DEMO', { "idMessage": "3EB0C7C70D37B7C7C03D" });
            // Почистим через пару секунд? Нет, оставим как иллюстрацию, но можно очистить
            // Для соответствия макету оставляем демо-ответ, но пользователь может очистить.
            setTimeout(() => {
                // если хотим показать точь-в-точь как на скрине:
                responseOutput.textContent = `[DEMO] sendMessage\n{\n  "idMessage": "3EB0C7C70D37B7C7C03D"\n}`;
            }, 10);
        });

        // Для удобства: при фокусе на любом поле не скрываем панели.
        console.log('✅ Макет GREEN-API готов');
    })();
</script>
</body>
</html>
